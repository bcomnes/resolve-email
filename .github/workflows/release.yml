name: npm release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type'
        type: choice
        options:
          - major
          - minor
          - patch
          - custom
        default: 'patch'
        required: true
      newversion:
        description: 'Custom version (used when version_type is "custom")'
        required: false

env:
  node_version: '24'
  FORCE_COLOR: 1

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: true

jobs:
  version_and_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch full history so things like auto-changelog work properly
          fetch-depth: 0
          submodules: true

      - name: Use Node.js ${{ env.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node_version }}

      - name: Install dependencies
        run: npm i

      - name: Test
        run: npm test

      - name: Resolve release version
        id: resolve_version
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.version_type }}" = "custom" ]; then
            if [ -z "${{ github.event.inputs.newversion }}" ]; then
              echo "newversion is required when version_type is custom" >&2
              exit 1
            fi
            echo "newversion=${{ github.event.inputs.newversion }}" >> "$GITHUB_OUTPUT"
          else
            echo "newversion=${{ github.event.inputs.version_type }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git author
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: git status before version
        run: git status --short --branch

      - name: npm version
        run: npm version "${{ steps.resolve_version.outputs.newversion }}"

      - name: npm publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
